x-api-build: &api-build
  context: ./BE/api

services:
  api:
    build: *api-build
    image: gesture-skill-api:local
    env_file:
      - ./BE/api/.env.example
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

  db-migrate:
    build: *api-build
    image: gesture-skill-api:local
    env_file:
      - ./BE/api/.env.example
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: ./FE/app
      args:
        VITE_ENABLE_DEBUG_FALLBACK: "true"
    env_file:
      - ./FE/app/.env.example
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gesture_skill
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d gesture_skill"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  db-data:
